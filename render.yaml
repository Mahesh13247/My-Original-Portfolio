services:
  - type: web
    name: kmaheshkumarachary
    runtime: node
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false   # Set this in the Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false   # Set this in the Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # Set this in the Render dashboard
    healthCheckPath: /api/projects
